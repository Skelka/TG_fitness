<!DOCTYPE html>
<html>
<head>
    <title>Фитнес Трекер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #111;
            padding: 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .header p {
            margin: 0;
            font-size: 14px;
            color: #aaa;
        }
        .nav {
            display: flex;
            justify-content: space-around;
            background-color: #222;
            padding: 10px 0;
        }
        .nav img {
            width: 24px;
            height: 24px;
        }
        .content {
            padding: 20px;
        }
        .card {
            background-color: #333;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
        }
        .card img {
            width: 100%;
            height: auto;
            opacity: 0.7;
        }
        .card h2 {
            position: absolute;
            top: 10px;
            left: 10px;
            margin: 0;
            font-size: 20px;
            color: #fff;
        }
        .card p {
            position: absolute;
            bottom: 10px;
            left: 10px;
            margin: 0;
            font-size: 14px;
            color: #fff;
        }
        .settings {
            background-color: #333;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        .settings h2 {
            margin-top: 0;
        }
        .settings label {
            display: block;
            margin-bottom: 10px;
        }
        .settings input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Гантели</h1>
        <p>Стандартные</p>
    </div>
    <div class="nav">
        <img src="icon1.png" alt="icon1">
        <img src="icon2.png" alt="icon2">
        <img src="icon3.png" alt="icon3">
        <img src="icon4.png" alt="icon4">
    </div>
    <div class="content">
        <div class="card">
            <img src="dumbbells.jpg" alt="dumbbells">
            <h2>Начинающий</h2>
            <p>Ежедневно</p>
        </div>
        <div class="card">
            <img src="weight_loss.jpg" alt="weight loss">
            <h2>Сбрось вес</h2>
            <p>Ежедневно</p>
        </div>
        <!-- Добавьте больше карточек по аналогии -->
    </div>
    <div class="settings">
        <h2>Настройки</h2>
        <label>Рост: <input type="text" value="178 см"></label>
        <label>Вес: <input type="text" value="64 кг"></label>
        <!-- Добавьте больше настроек по аналогии -->
    </div>
</body>
</html>
