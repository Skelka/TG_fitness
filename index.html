<!DOCTYPE html>
<html>
<head>
    <title>Фитнес Трекер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            font-family: Arial, sans-serif;
            margin: 0;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: rgba(var(--tg-theme-bg-color, 255, 255, 255), 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: rgba(var(--tg-theme-secondary-bg-color, 240, 240, 240), 0.9);
            border-radius: 10px;
            padding: 5px;
            backdrop-filter: blur(5px);
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .tab.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .workout-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .exercise-item {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        select, input, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error {
            color: #ff4444;
            display: none;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 68, 68, 0.1);
        }
        .exercise-list {
            margin-top: 15px;
        }
        .sets-container {
            margin-top: 10px;
        }
        .set-row {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .set-row input {
            flex: 1;
        }
        .timer {
            font-size: 48px;
            text-align: center;
            margin: 20px 0;
            color: var(--tg-theme-text-color, #ffffff);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .exercise-card {
            background: rgba(var(--tg-theme-secondary-bg-color, 240, 240, 240), 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
        }
        
        .exercise-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .counter {
            font-size: 24px;
            text-align: center;
            margin: 10px 0;
        }
        
        .counter-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .template-list {
            margin-top: 20px;
        }
        
        .template-item {
            background: rgba(var(--tg-theme-secondary-bg-color, 240, 240, 240), 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .active-exercise {
            border: 2px solid var(--tg-theme-button-color, #2481cc);
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #2481cc);
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s;
        }
        h1, h2, h3 {
            color: var(--tg-theme-text-color, #ffffff);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="showTab('workout')">Тренировка</div>
            <div class="tab" onclick="showTab('templates')">Шаблоны</div>
            <div class="tab" onclick="showTab('create')">Создать</div>
        </div>

        <!-- Вкладка активной тренировки -->
        <div id="workout" class="tab-content active">
            <h2>Текущая тренировка</h2>
            <div class="timer">00:00</div>
            <div class="timer-controls">
                <button onclick="startTimer()">Старт</button>
                <button onclick="pauseTimer()">Пауза</button>
                <button onclick="resetTimer()">Сброс</button>
            </div>
            
            <div id="currentExercise" class="exercise-card">
                <h3>Текущее упражнение</h3>
                <div class="counter">0 / <span id="targetReps">12</span></div>
                <div class="counter-controls">
                    <button onclick="decrementReps()">-</button>
                    <button onclick="incrementReps()">+</button>
                </div>
                <div class="progress-bar">
                    <div class="progress-bar-fill"></div>
                </div>
            </div>
            
            <div id="exerciseQueue"></div>
            <button onclick="finishWorkout()">Завершить тренировку</button>
        </div>

        <!-- Вкладка шаблонов -->
        <div id="templates" class="tab-content">
            <h2>Мои тренировки</h2>
            <div id="templateList" class="template-list">
                <!-- Шаблоны будут добавляться здесь -->
            </div>
        </div>

        <!-- Вкладка создания тренировки -->
        <div id="create" class="tab-content">
            <h2>Создать тренировку</h2>
            <div class="workout-form">
                <input type="text" id="workoutName" placeholder="Название тренировки">
                <select id="workoutType">
                    <option value="">Выберите тип тренировки</option>
                    <option value="strength">Силовая</option>
                    <option value="cardio">Кардио</option>
                    <option value="hiit">HIIT</option>
                </select>
                
                <div id="exerciseList" class="exercise-list"></div>
                <button onclick="addExerciseToTemplate()">Добавить упражнение</button>
                <button onclick="saveTemplate()">Сохранить тренировку</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let timer;
        let seconds = 0;
        let isRunning = false;
        let currentWorkout = null;
        let currentExerciseIndex = 0;
        let currentReps = 0;
        
        // Инициализация
        if (tg) {
            console.log("Telegram WebApp успешно инициализирован");
            tg.expand();
            loadTemplates();
        }

        // Функции для таймера
        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                timer = setInterval(updateTimer, 1000);
            }
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timer);
        }

        function resetTimer() {
            isRunning = false;
            clearInterval(timer);
            seconds = 0;
            updateTimerDisplay();
        }

        function updateTimer() {
            seconds++;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            document.querySelector('.timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        // Функции для упражнений
        function incrementReps() {
            if (!currentWorkout) return;
            currentReps++;
            updateRepsDisplay();
        }

        function decrementReps() {
            if (!currentWorkout || currentReps <= 0) return;
            currentReps--;
            updateRepsDisplay();
        }

        function updateRepsDisplay() {
            const counter = document.querySelector('.counter');
            const targetReps = currentWorkout.exercises[currentExerciseIndex].reps;
            counter.textContent = `${currentReps} / ${targetReps}`;
            
            // Обновляем прогресс-бар
            const progress = (currentReps / targetReps) * 100;
            document.querySelector('.progress-bar-fill').style.width = `${progress}%`;
        }

        // Функции для создания тренировок
        function addExerciseToTemplate() {
            const exerciseList = document.getElementById('exerciseList');
            const exerciseDiv = document.createElement('div');
            exerciseDiv.className = 'exercise-item';
            
            exerciseDiv.innerHTML = `
                <input type="text" placeholder="Название упражнения">
                <input type="number" placeholder="Количество подходов">
                <input type="number" placeholder="Повторений">
                <input type="number" placeholder="Вес (кг)">
                <button onclick="this.parentElement.remove()">Удалить</button>
            `;
            
            exerciseList.appendChild(exerciseDiv);
        }

        function saveTemplate() {
            const name = document.getElementById('workoutName').value;
            const type = document.getElementById('workoutType').value;
            
            if (!name || !type) {
                showError("Заполните название и тип тренировки");
                return;
            }

            const exercises = [];
            document.querySelectorAll('.exercise-item').forEach(item => {
                const inputs = item.querySelectorAll('input');
                exercises.push({
                    name: inputs[0].value,
                    sets: parseInt(inputs[1].value),
                    reps: parseInt(inputs[2].value),
                    weight: parseFloat(inputs[3].value)
                });
            });

            const template = {
                name: name,
                type: type,
                exercises: exercises
            };

            // Сохраняем шаблон
            const templates = JSON.parse(localStorage.getItem('workoutTemplates') || '[]');
            templates.push(template);
            localStorage.setItem('workoutTemplates', JSON.stringify(templates));
            
            loadTemplates();
            showTab('templates');
        }

        function loadTemplates() {
            const templateList = document.getElementById('templateList');
            templateList.innerHTML = '';
            
            const templates = JSON.parse(localStorage.getItem('workoutTemplates') || '[]');
            templates.forEach((template, index) => {
                const templateDiv = document.createElement('div');
                templateDiv.className = 'template-item';
                templateDiv.innerHTML = `
                    <h3>${template.name}</h3>
                    <p>Тип: ${template.type}</p>
                    <p>Упражнений: ${template.exercises.length}</p>
                    <button onclick="startWorkout(${index})">Начать</button>
                `;
                templateList.appendChild(templateDiv);
            });
        }

        function startWorkout(templateIndex) {
            const templates = JSON.parse(localStorage.getItem('workoutTemplates') || '[]');
            currentWorkout = templates[templateIndex];
            currentExerciseIndex = 0;
            currentReps = 0;
            
            // Показываем первое упражнение
            showCurrentExercise();
            resetTimer();
            showTab('workout');
        }

        function showCurrentExercise() {
            if (!currentWorkout || !currentWorkout.exercises[currentExerciseIndex]) return;
            
            const exercise = currentWorkout.exercises[currentExerciseIndex];
            const exerciseCard = document.getElementById('currentExercise');
            exerciseCard.innerHTML = `
                <h3>${exercise.name}</h3>
                <p>Подход ${currentExerciseIndex + 1} из ${currentWorkout.exercises.length}</p>
                <p>Вес: ${exercise.weight} кг</p>
                <div class="counter">0 / ${exercise.reps}</div>
                <div class="counter-controls">
                    <button onclick="decrementReps()">-</button>
                    <button onclick="incrementReps()">+</button>
                </div>
                <div class="progress-bar">
                    <div class="progress-bar-fill"></div>
                </div>
                <button onclick="nextExercise()">Следующее упражнение</button>
            `;
        }

        function nextExercise() {
            currentExerciseIndex++;
            currentReps = 0;
            
            if (currentExerciseIndex >= currentWorkout.exercises.length) {
                // Тренировка завершена
                finishWorkout();
            } else {
                showCurrentExercise();
            }
        }

        function finishWorkout() {
            const workoutData = {
                type: currentWorkout.type,
                name: currentWorkout.name,
                duration: seconds,
                exercises: currentWorkout.exercises,
                completed: true
            };
            
            tg.sendData(JSON.stringify(workoutData));
            tg.close();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function showError(message) {
            // Показываем ошибку пользователю
            alert(message);
        }
    </script>
</body>
</html>
