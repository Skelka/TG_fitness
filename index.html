<body>
    <div id="workouts-page" class="page">
        <div class="workout-types">
            <div class="workout-type-card" 
                 onclick="showWorkoutDays(1)"
                 style="background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48')">
                <h3>Силовая тренировка</h3>
                <p>Тренировка для набора мышечной массы</p>
            </div>
            <div class="workout-type-card"
                 onclick="showWorkoutDays(2)"
                 style="background-image: url('https://images.unsplash.com/photo-1538805060514-97d9cc17730c')">
                <h3>Кардио</h3>
                <p>Тренировка для сжигания жира</p>
            </div>
            <div class="workout-type-card"
                 onclick="showWorkoutDays(3)"
                 style="background-image: url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b')">
                <h3>Растяжка</h3>
                <p>Упражнения для гибкости</p>
            </div>
        </div>
    </div>

    <div id="workout-days-page" class="page">
        <div class="header">
            <button class="back-button" onclick="goBack()">← Назад</button>
            <h1 id="workout-type-title"></h1>
        </div>
        <div id="workout-days" class="days-list"></div>
    </div>

    <div id="profile-page" class="page">
        <div class="profile-section">
            <div class="profile-header">
                <div class="profile-photo">
                    <img id="profile-image" src="images/default-avatar.png" alt="Profile photo">
                </div>
                <div class="profile-info">
                    <h2 class="profile-name" id="tg-username">Загрузка...</h2>
                </div>
            </div>
            
            <div class="profile-field">
                <label>Возраст</label>
                <input type="number" id="age" placeholder="Укажите ваш возраст">
            </div>
            
            <div class="profile-field">
                <label>Рост (см)</label>
                <input type="number" id="height" placeholder="Укажите ваш рост">
            </div>
            
            <div class="profile-field">
                <label>Вес (кг)</label>
                <input type="number" id="weight" placeholder="Укажите ваш вес">
            </div>
            
            <div class="profile-field">
                <label>Цель тренировок</label>
                <select id="goal">
                    <option value="">Выберите цель</option>
                    <option value="weight_loss">Похудение</option>
                    <option value="muscle_gain">Набор мышечной массы</option>
                    <option value="endurance">Выносливость</option>
                    <option value="maintenance">Поддержание формы</option>
                </select>
            </div>
        </div>
    </div>

    <div id="stats-page" class="page">
        <div class="stats-section">
            <div class="stats-header">
                <h2>Статистика веса</h2>
                <select id="weight-period">
                    <option value="week">За неделю</option>
                    <option value="month">За месяц</option>
                </select>
            </div>
            <div class="chart-container">
                <canvas id="weightChart"></canvas>
            </div>
            <div class="stats-summary">
                <div class="stat-item">
                    <span class="stat-label">Начальный вес</span>
                    <span class="stat-value" id="initial-weight">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Текущий вес</span>
                    <span class="stat-value" id="current-weight">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Изменение</span>
                    <span class="stat-value" id="weight-change">-</span>
                </div>
            </div>
        </div>

    <div id="exercises-page" class="page">
        <div class="header">
            <button class="back-button" onclick="goBack()">← Назад</button>
            <h1 id="exercise-day-title"></h1>
        </div>
        <div id="exercise-list" class="exercises-list"></div>
    </div>

    <div id="active-exercise-page" class="page">
        <div class="header">
            <div class="header-top">
                <button class="back-button" onclick="confirmExitExercise()">← Назад</button>

            <div class="header-bottom">

        </div>

                <div class="timer" id="exercise-timer">
                    <span id="timer-value">00:00</span>

            <div class="exercise-controls">

                <button id="complete-set-btn" class="success-button" onclick="completeSet()" style="display: none;">
                    Завершить подход

    </div>

    <script>
        let tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            
            // Получаем данные из URL
            const urlParams = new URLSearchParams(window.location.search);
            const encodedData = urlParams.get('data');
            
            if (encodedData) {
                try {
                    const data = JSON.parse(decodeURIComponent(encodedData));
                    log('Получены данные из URL:');
                    log(JSON.stringify(data, null, 2));
                    
                    document.getElementById('tg-username').textContent = data.username || 'Пользователь';
                    if (data.age) document.getElementById('age').value = data.age;
                    if (data.height) document.getElementById('height').value = data.height;
                    if (data.weight) document.getElementById('weight').value = data.weight;
                    if (data.goal) document.getElementById('goal').value = data.goal;
                    if (data.photo_url) {
                        log(`Загружаем фото из URL: ${data.photo_url}`);
                        const profileImage = document.getElementById('profile-image');
                        profileImage.src = data.photo_url;
                        profileImage.onerror = function(e) {
                            log(`Ошибка загрузки фото: ${e.message}`);
                            this.src = 'images/default-avatar.png';
                        };
                        profileImage.onload = function() {
                            log('Фото успешно загружено');
                        };
                    } else {
                        log('URL фото отсутствует в данных');
                    }
                } catch (e) {
                    console.error('Ошибка при загрузке данных:', e);
                    log(`Ошибка при обработке данных: ${e.message}`);
                }
            }
        }

        function showPage(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }

        async function loadProfileData() {
            try {
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('tg-username').textContent = user.username || 'Пользователь';
                    
                    // Сначала пробуем загрузить из localStorage
                    const savedData = localStorage.getItem('profileData');
                    if (savedData) {
                        const data = JSON.parse(savedData);
                        updateProfileFields(data);
                    }
                    
                    // Затем запрашиваем актуальные данные с сервера
                    tg.sendData(JSON.stringify({
                        type: 'get_profile_data'
                    }));
                }
            } catch (error) {
                console.error('Ошибка при загрузке данных:', error);
            }
        }

        // Обновим функцию обновления полей
        function updateProfileFields(data) {
            if (data.age) document.getElementById('age').value = data.age;
            if (data.height) document.getElementById('height').value = data.height;
            if (data.weight) document.getElementById('weight').value = data.weight;
            if (data.goal) document.getElementById('goal').value = data.goal;
            if (data.photo_url) {
                const profileImage = document.getElementById('profile-image');
                profileImage.src = data.photo_url;
                profileImage.onerror = function() {
                    this.src = 'images/default-avatar.png';
                };
            }
        }

        // Вызываем загрузку данных при открытии страницы и при переходе на вкладку профиля
        document.addEventListener('DOMContentLoaded', loadProfileData);

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                const pageId = this.getAttribute('data-page');
                if (pageId) {
                    showPage(pageId);
                    if (pageId === 'profile-page') {
                        loadProfileData();
                    }
                }
            });
        });

        // Изменим обработчики полей
        ['age', 'height', 'weight', 'goal'].forEach(fieldId => {
            const element = document.getElementById(fieldId);
            
            // Сохраняем значение при потере фокуса
            element.addEventListener('blur', function() {
                const value = this.value.trim();
                
                // Проверяем валидность введенных данных
                let isValid = true;
                if (fieldId === 'age') {
                    isValid = value.length > 0 && parseInt(value) > 0 && parseInt(value) < 120;
                } else if (fieldId === 'height') {
                    isValid = value.length > 2 && parseFloat(value) > 50 && parseFloat(value) < 250;
                } else if (fieldId === 'weight') {
                    isValid = value.length > 1 && parseFloat(value) > 20 && parseFloat(value) < 300;
                } else if (fieldId === 'goal') {
                    isValid = value !== '';
                }

                // Сохраняем только если данные валидны
                if (isValid) {
                    const profileData = {
                        age: document.getElementById('age').value,
                        height: document.getElementById('height').value,
                        weight: document.getElementById('weight').value,
                        goal: document.getElementById('goal').value
                    };
                    
                    // Сохраняем в localStorage
                    localStorage.setItem('profileData', JSON.stringify(profileData));
                }
            });
        });

        // Добавим кнопку сохранения
        document.querySelector('.profile-section').insertAdjacentHTML('beforeend', `
            <button id="saveProfileBtn" style="
                width: 100%;
                padding: 12px;
                background-color: #7C5AF1;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                margin-top: 20px;
                cursor: pointer;
            ">Сохранить изменения</button>
        `);

        // Обработчик для кнопки сохранения
        document.getElementById('saveProfileBtn').addEventListener('click', function() {
            const profileData = {
                age: document.getElementById('age').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value,
                goal: document.getElementById('goal').value
            };
            
            // Отправляем данные через WebApp
            tg.sendData(JSON.stringify({
                type: 'profile_update',
                data: profileData
            }));
        });

        function initProfile() {
            if (tg.initDataUnsafe?.user?.photo_url) {
                document.getElementById('profile-image').src = tg.initDataUnsafe.user.photo_url;
            }
        }

        document.querySelector('.profile-photo').addEventListener('click', function() {
            tg.showPopup({
                title: 'Обновить фото профиля',
                message: 'Отправьте фото в чат с ботом',
                buttons: [
                    {id: 'ok', type: 'ok', text: 'OK'}
                ]
            });
        });

        // Обновим обработчик переключения вкладок
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                const pageId = this.getAttribute('data-page');
                if (pageId) {
                    showPage(pageId);
                    if (pageId === 'profile-page') {
                        initProfile();
                        loadProfileData();
                    }
                }
            });
        });

        // Обновим функцию обработки ответа от бота
        function handleBotResponse(response) {
            try {
                const data = JSON.parse(response);
                console.log('Получены данные от бота:', data);
                
                // Обновляем поля только если есть данные
                const fields = {
                    'age': data.age,
                    'height': data.height,
                    'weight': data.weight,
                    'goal': data.goal
                };

                for (const [field, value] of Object.entries(fields)) {
                    const element = document.getElementById(field);
                    if (value !== null && value !== undefined) {
                        element.value = value;
                    }
                }

                if (data.photo_url) {
                    document.getElementById('profile-image').src = data.photo_url;
                }
            } catch (e) {
                console.error('Ошибка при обработке ответа от бота:', e);
            }
        }

        // Добавим обработчик для получения данных от бота
        if (tg) {
            tg.onEvent('message', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'profile_data') {
                        updateProfileFields(data);
                        localStorage.setItem('profileData', JSON.stringify(data));
                    }
                } catch (e) {
                    console.error('Ошибка при обработке сообщения:', e);
                }
            });
        }

        // Добавим функцию для первоначальной загрузки данных
        async function initializeProfileData() {
            try {
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    const response = await fetch(`http://localhost:8000/getProfileData?user_id=${user.id}`);
                    const data = await response.json();
                    if (data.ok) {
                        updateProfileFields(data.result);
                        localStorage.setItem('profileData', JSON.stringify(data.result));
                    }
                }
            } catch (error) {
                console.error('Ошибка при инициализации данных профиля:', error);
                // Пробуем загрузить из localStorage если запрос не удался
                const savedData = localStorage.getItem('profileData');
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        updateProfileFields(data);
                    } catch (e) {
                        console.error('Ошибка при загрузке локальных данных:', e);
                    }
                }
            }
        }

        // Вызываем инициализацию при загрузке страницы
        if (tg) {
            initializeProfileData();
        }

        // Добавим функции для работы с графиком

        async function loadWeightStats(period = 'month') {
            try {
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    // Запрашиваем данные через WebApp
                    tg.sendData(JSON.stringify({
                        type: 'get_weight_history',
                        period: period
                    }));
                }
            } catch (error) {
                console.error('Ошибка при загрузке статистики:', error);
            }
        }

        function updateWeightChart(data) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            
            // Уничтожаем предыдущий график если он существует
            if (weightChart) {
                weightChart.destroy();
            }
            
            // Создаем новый график
            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.dates,
                    datasets: [{
                        label: 'Вес (кг)',
                        data: data.weights,
                        borderColor: '#7C5AF1',
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });

            // Обновляем сводную информацию
            if (data.weights.length > 0) {
                document.getElementById('initial-weight').textContent = 
                    data.weights[0] + ' кг';
                document.getElementById('current-weight').textContent = 
                    data.weights[data.weights.length - 1] + ' кг';
                
                const change = data.weights[data.weights.length - 1] - data.weights[0];
                const changeElement = document.getElementById('weight-change');
                changeElement.textContent = Math.abs(change).toFixed(1) + ' кг';
                changeElement.style.color = change < 0 ? '#28a745' : '#dc3545';
            }
        }

        // Добавляем обработчик изменения периода
        document.getElementById('weight-period').addEventListener('change', function() {
            loadWeightStats(this.value);
        });

        // Обновляем обработчик сообщений от бота
        if (tg) {
            tg.onEvent('message', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'weight_history') {
                        updateWeightChart(data);
                    }
                } catch (e) {
                    console.error('Ошибка при обработке сообщения:', e);
                }
            });
        }

        // Загружаем статистику при открытии страницы
        document.addEventListener('DOMContentLoaded', () => loadWeightStats());

        // Обновим функции для навигации
        function showWorkoutDays(workoutTypeId) {
            const workout = workoutPrograms[workoutTypeId];
            if (!workout) return;

            // Установим соответствующую картинку для заголовка
            setHeaderImage(workoutTypeId);
            
            document.getElementById('workout-type-title').textContent = workout.name;
            
            const container = document.getElementById('workout-days');
            container.innerHTML = Object.entries(workout.days).map(([dayNum, day]) => `
                <div class="day-card" onclick="showDayExercises(${workoutTypeId}, ${dayNum})">
                    <h3>${day.name}</h3>
                    <p>${day.exercises.length} упражнений</p>
                </div>
            `).join('');

            showPage('workout-days-page');
        }

        function showDayExercises(workoutTypeId, dayNum) {
            const workout = workoutPrograms[workoutTypeId];
            const day = workout.days[dayNum];
            
            // Сохраняем ту же картинку заголовка
            setHeaderImage(workoutTypeId);
            
            document.getElementById('exercise-day-title').textContent = day.name;
            
            const container = document.getElementById('exercise-list');
            container.innerHTML = day.exercises.map((exercise, index) => `
                <div class="exercise-card">
                    <h3>${exercise.name}</h3>
                    <p>${exercise.description}</p>
                    <div class="exercise-details">
                        <span>${exercise.sets} подхода</span>
                        <span>${exercise.reps}</span>
                        <span>Отдых: ${exercise.rest}</span>
                    </div>
                    <button class="primary-button" 
                            onclick="startExercise(${workoutTypeId}, ${dayNum}, ${index})"
                            style="margin-top: 15px; width: 100%;">
                        Начать упражнение
                    </button>

            `).join('');

            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.style.display = 'none');
            document.getElementById('workouts-page').style.display = 'block';
        }

        // Функция для переключения между страницами
        function showPage(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }

            showPage('workouts-page');

            initWorkoutsPage();

            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    const pageId = this.getAttribute('data-page');
                    if (pageId) {
                        showPage(pageId);
                        // Обновляем активный элемент навигации
                        document.querySelectorAll('.nav-item').forEach(navItem => {
                            navItem.classList.remove('active');
                        });
                        this.classList.add('active');
                    }
                });
            });
        });

        if (tg) {

                    if (data.type === 'exercises_list') {

        // Функция для возврата назад
        function goBack() {
            const currentPage = document.querySelector('.page[style*="block"]');
            if (currentPage.id === 'workout-days-page') {
                showPage('workouts-page');
            } else if (currentPage.id === 'exercises-page') {
                showPage('workout-days-page');
            } else if (currentPage.id === 'active-exercise-page') {
                confirmExitExercise();
            }
        }

        let currentExercise = null;
        let currentSet = 1;
        let timerInterval = null;
        let restTime = 0;

        function startExercise(workoutTypeId, dayNum, exerciseIndex) {
            const exercise = workoutPrograms[workoutTypeId].days[dayNum].exercises[exerciseIndex];
            currentExercise = exercise;
            currentSet = 1;
            
            document.getElementById('active-exercise-title').textContent = exercise.name;
            document.getElementById('active-exercise-description').textContent = exercise.description;
            document.getElementById('active-exercise-target').textContent = 
                `Цель: ${exercise.sets} подхода по ${exercise.reps}`;
            document.getElementById('total-sets').textContent = exercise.sets;
            document.getElementById('current-set').textContent = currentSet;
            
            showPage('active-exercise-page');
        }

        function startSet() {
            document.getElementById('start-set-btn').style.display = 'none';
            document.getElementById('complete-set-btn').style.display = 'block';
            document.getElementById('timer-label').textContent = 'Выполнение';
            startTimer(0, true); // Запускаем таймер выполнения
        }

        function completeSet() {
            if (currentSet < currentExercise.sets) {
                currentSet++;
                document.getElementById('current-set').textContent = currentSet;
                document.getElementById('start-set-btn').style.display = 'block';
                document.getElementById('complete-set-btn').style.display = 'none';
                
                // Парсим время отдыха из строки (например, "90 сек" -> 90)
                restTime = parseInt(currentExercise.rest);
                document.getElementById('timer-label').textContent = 'Отдых';
                startTimer(restTime);
            } else {
                completeExercise();
            }
        }

        function startTimer(seconds, isWorkout = false) {
            if (timerInterval) clearInterval(timerInterval);
            
            const timerDisplay = document.getElementById('timer-value');
            let timeLeft = seconds;
            
            updateTimerDisplay(timeLeft);
            
            if (!isWorkout) { // Если это таймер отдыха
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay(timeLeft);
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        playNotificationSound();
                    }
                }, 1000);
            }
        }

        function updateTimerDisplay(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            document.getElementById('timer-value').textContent = 
                `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        function completeExercise() {
            const container = document.querySelector('.exercise-content');
            container.innerHTML = `
                <div class="exercise-complete">
                    <h2>Упражнение завершено!</h2>
                    <button class="primary-button" onclick="goBack()">
                        Вернуться к списку упражнений
                    </button>
                </div>
            `;
        }

        function confirmExitExercise() {
            if (timerInterval) {
                if (confirm('Вы уверены, что хотите прервать упражнение?')) {
                    clearInterval(timerInterval);
                    showPage('exercises-page');
                }
            } else {
                showPage('exercises-page');
            }
        }

        function playNotificationSound() {
            // Можно добавить звук уведомления
            const audio = new Audio('notification.mp3');
            audio.play().catch(e => console.log('Ошибка воспроизведения звука:', e));
        }

        // Добавим функцию для установки фоновой картинки заголовка
        function setHeaderImage(workoutTypeId) {
            const headerImages = {
                1: 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48', // Силовые
                2: 'https://images.unsplash.com/photo-1538805060514-97d9cc17730c', // Кардио
                3: 'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b'  // Растяжка
            };
            
            document.documentElement.style.setProperty(
                '--header-image', 
                `url('${headerImages[workoutTypeId] || headerImages[1]}')`
            );
        }
    </script>
