<!DOCTYPE html>
<html>
<head>
    <title>Фитнес Трекер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1E1E1E;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .content {
            padding: 20px;
        }

        .workout-card {
            background-color: #fff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            color: #333;
        }

        .workout-card h2 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }

        .workout-card p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #666;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-item.active {
            color: #7C5AF1;
        }

        .nav-item img {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        /* Стили для списка тренировок */
        .workout-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 70px; /* Отступ для нижней навигации */
        }

        .workout-type {
            background-color: #fff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 8px;
            color: #333;
        }

        .workout-type h3 {
            margin: 0;
            font-size: 16px;
            font-weight: bold;
        }

        .workout-type p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #666;
        }

        .page {
            display: none;
            padding: 20px;
            padding-bottom: 70px;
        }
        
        .page.active {
            display: block;
        }
        
        .profile-section {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            color: #333;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .profile-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #eee;
            margin-right: 15px;
            overflow: hidden;
        }
        
        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-name {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
        }
        
        .profile-field {
            margin: 15px 0;
        }
        
        .profile-field label {
            display: block;
            color: #666;
            margin-bottom: 5px;
        }
        
        .profile-field input, .profile-field select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="workouts-page" class="page active">
        <div class="workout-list">
            <div class="workout-type">
                <h3>Всё тело</h3>
                <p>Общее описание</p>
            </div>
            <div class="workout-type">
                <h3>Выносливость</h3>
                <p>Общее описание</p>
            </div>
            <div class="workout-type">
                <h3>Похудение</h3>
                <p>Общее описание</p>
            </div>
            <div class="workout-type">
                <h3>Начинающий</h3>
                <p>Общее описание</p>
            </div>
        </div>
    </div>

    <div id="profile-page" class="page">
        <div class="profile-section">
            <div class="profile-header">
                <div class="profile-photo">
                    <img id="profile-image" src="images/default-avatar.png" alt="Profile photo">
                </div>
                <div class="profile-info">
                    <h2 class="profile-name" id="tg-username">Загрузка...</h2>
                </div>
            </div>
            
            <div class="profile-field">
                <label>Возраст</label>
                <input type="number" id="age" placeholder="Укажите ваш возраст">
            </div>
            
            <div class="profile-field">
                <label>Рост (см)</label>
                <input type="number" id="height" placeholder="Укажите ваш рост">
            </div>
            
            <div class="profile-field">
                <label>Вес (кг)</label>
                <input type="number" id="weight" placeholder="Укажите ваш вес">
            </div>
            
            <div class="profile-field">
                <label>Цель тренировок</label>
                <select id="goal">
                    <option value="">Выберите цель</option>
                    <option value="weight_loss">Похудение</option>
                    <option value="muscle_gain">Набор мышечной массы</option>
                    <option value="endurance">Выносливость</option>
                    <option value="maintenance">Поддержание формы</option>
                </select>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active" data-page="workouts-page">
            <img src="images/workout.png" alt="Тренировки">
            <span>Тренировки</span>
        </a>
        <a href="#" class="nav-item" data-page="templates-page">
            <img src="images/templates.png" alt="Мои шаблоны">
            <span>Мои шаблоны</span>
        </a>
        <a href="#" class="nav-page" data-page="stats-page">
            <img src="images/stats.png" alt="Статистика">
            <span>Статистика</span>
        </a>
        <a href="#" class="nav-item" data-page="profile-page">
            <img src="images/profile.png" alt="Профиль">
            <span>Профиль</span>
        </a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            document.getElementById('tg-username').textContent = tg.initDataUnsafe?.user?.username || 'Пользователь';
            initProfile();
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                const pageId = this.getAttribute('data-page');
                if (pageId) {
                    showPage(pageId);
                }
            });
        });

        function saveProfileData() {
            const profileData = {
                age: document.getElementById('age').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value,
                goal: document.getElementById('goal').value
            };
            
            tg.sendData(JSON.stringify({
                type: 'profile_update',
                data: profileData
            }));
        }

        ['age', 'height', 'weight', 'goal'].forEach(fieldId => {
            document.getElementById(fieldId).addEventListener('change', saveProfileData);
        });

        function initProfile() {
            if (tg.initDataUnsafe?.user?.photo_url) {
                document.getElementById('profile-image').src = tg.initDataUnsafe.user.photo_url;
            }
            
            tg.sendData(JSON.stringify({
                type: 'get_profile_data'
            }));
        }

        document.querySelector('.profile-photo').addEventListener('click', function() {
            tg.showPopup({
                title: 'Обновить фото профиля',
                message: 'Выберите новое фото профиля',
                buttons: [
                    {id: 'choose_photo', type: 'default', text: 'Выбрать фото'},
                    {id: 'cancel', type: 'cancel', text: 'Отмена'}
                ]
            }, function(buttonId) {
                if (buttonId === 'choose_photo') {
                    tg.openMedia({
                        type: 'photo',
                        caption: 'Выберите фото'
                    });
                }
            });
        });
    </script>
</body>
</html>
