<!DOCTYPE html>
<html>
<head>
    <title>Фитнес Трекер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #1E1E1E;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .content {
            padding: 20px;
        }

        .workout-card {
            background-color: #fff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            color: #333;
        }

        .workout-card h2 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }

        .workout-card p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #666;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #eee;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }

        .nav-item.active {
            color: #7C5AF1;
        }

        .nav-item img {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        /* Стили для списка тренировок */
        .workout-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 70px; /* Отступ для нижней навигации */
        }

        .workout-type {
            background-color: #fff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 8px;
            color: #333;
        }

        .workout-type h3 {
            margin: 0;
            font-size: 16px;
            font-weight: bold;
        }

        .workout-type p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="workout-list">
            <div class="workout-type">
                <h3>Всё тело</h3>
                <p>Общее описание</p>
            </div>
            <div class="workout-type">
                <h3>Выносливость</h3>
                <p>Общее описание</p>
            </div>
            <div class="workout-type">
                <h3>Похудение</h3>
                <p>Общее описание</p>
            </div>
            <div class="workout-type">
                <h3>Начинающий</h3>
                <p>Общее описание</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active">
            <img src="images/workout.png" alt="Тренировки">
            <span>Тренировки</span>
        </a>
        <a href="#" class="nav-item">
            <img src="images/templates.png" alt="Мои шаблоны">
            <span>Мои шаблоны</span>
        </a>
        <a href="#" class="nav-item">
            <img src="images/stats.png" alt="Статистика">
            <span>Статистика</span>
        </a>
        <a href="#" class="nav-item">
            <img src="images/profile.png" alt="Профиль">
            <span>Профиль</span>
        </a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
        }

        // Обработчики для нижней навигации
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
