<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <div id="loading" style="display: none;">
            <div class="spinner"></div>
        </div>

        <!-- Главное меню -->
        <div class="section" id="main-menu">
            <div class="menu-item" onclick="showSection('workout')">
                <i class="icon workout-icon"></i>
                <span>Тренировка</span>
            </div>
            <div class="menu-item" onclick="showSection('profile')">
                <i class="icon profile-icon"></i>
                <span>Профиль</span>
            </div>
            <div class="menu-item" onclick="showSection('statistics')">
                <i class="icon stats-icon"></i>
                <span>Статистика</span>
            </div>
        </div>

        <!-- Секция тренировки -->
        <div class="section hidden" id="workout-section">
            <div class="workout-types">
                <button class="workout-type" data-type="cardio" onclick="startWorkout('cardio')">Кардио</button>
                <button class="workout-type" data-type="strength" onclick="startWorkout('strength')">Силовая</button>
                <button class="workout-type" data-type="yoga" onclick="startWorkout('yoga')">Йога</button>
            </div>
            <div id="active-workout" class="hidden">
                <div class="timer">00:00</div>
                <div class="workout-stats">
                    <div class="stat">
                        <span class="label">Калории</span>
                        <span class="value" id="calories">0</span>
                    </div>
                </div>
                <button class="btn-finish" onclick="finishWorkout()">Завершить</button>
            </div>
        </div>

        <!-- Секция профиля -->
        <div class="section hidden" id="profile-section">
            <form id="profile-form" onsubmit="saveProfile(event)">
                <div class="profile-photo">
                    <img id="profile-image" src="img/default-avatar.png" alt="Profile Photo">
                    <button type="button" onclick="uploadProfilePhoto()" class="btn-upload">
                        Загрузить фото
                    </button>
                </div>
                <div class="form-group">
                    <label>Возраст</label>
                    <input type="number" name="age" required min="14" max="100">
                </div>
                <div class="form-group">
                    <label>Рост (см)</label>
                    <input type="number" name="height" required min="100" max="250">
                </div>
                <div class="form-group">
                    <label>Вес (кг)</label>
                    <input type="number" name="weight" required min="30" max="300">
                </div>
                <div class="form-group">
                    <label>Уровень подготовки</label>
                    <select name="fitness_level" required>
                        <option value="beginner">Начинающий</option>
                        <option value="intermediate">Средний</option>
                        <option value="advanced">Продвинутый</option>
                    </select>
                </div>
                <button type="submit" class="btn-save">Сохранить</button>
            </form>
        </div>

        <!-- Секция статистики -->
        <div class="section hidden" id="statistics-section">
            <div class="stats-summary">
                <div class="stat-card">
                    <span class="stat-label">Тренировок</span>
                    <span class="stat-value" id="total-workouts">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Калорий сожжено</span>
                    <span class="stat-value" id="total-calories">0</span>
                </div>
            </div>
            <div id="workout-history"></div>
        </div>

        <!-- В секции настроек -->
        <div class="settings-section">
            <h3>Подключенные трекеры</h3>
            <div class="trackers">
                <button onclick="connectTracker('googlefit')" class="tracker-button">
                    <img src="img/googlefit-logo.png" alt="Google Fit">
                    Подключить Google Fit
                </button>
                <button onclick="connectTracker('fitbit')" class="tracker-button">
                    <img src="img/fitbit-logo.png" alt="Fitbit">
                    Подключить Fitbit
                </button>
            </div>
            
            <h3>Цели тренировок</h3>
            <div class="goals">
                <div class="goal-item" onclick="toggleGoal('weight')" data-goal="weight">
                    Снижение веса
                </div>
                <div class="goal-item" onclick="toggleGoal('muscle')" data-goal="muscle">
                    Набор мышечной массы
                </div>
            </div>
            
            <h3>Ограничения</h3>
            <div class="restrictions">
                <div class="restriction-item" onclick="toggleRestriction('joints')" data-restriction="joints">
                    Проблемы с суставами
                </div>
            </div>
            
            <h3>Уведомления</h3>
            <div class="notifications">
                <label>
                    <input type="checkbox" onchange="updateNotificationSettings('workout_reminder', this.checked)">
                    Напоминания о тренировках
                </label>
                <label>
                    <input type="checkbox" onchange="updateNotificationSettings('goal_updates', this.checked)">
                    Обновления целей
                </label>
            </div>
        </div>
    </div>

    <!-- Инициализация приложения -->
    <script>
    // Глобальные функции
    window.tg = window.Telegram.WebApp;
    window.tg.ready();
    window.tg.expand();

    // Функции для работы с целями
    window.toggleGoal = function(goalType) {
        const goals = JSON.parse(localStorage.getItem('goals') || '{}');
        goals[goalType] = !goals[goalType];
        localStorage.setItem('goals', JSON.stringify(goals));
        updateGoalsUI();
    };

    // Функции для работы с ограничениями
    window.toggleRestriction = function(restrictionType) {
        const restrictions = JSON.parse(localStorage.getItem('restrictions') || '{}');
        restrictions[restrictionType] = !restrictions[restrictionType];
        localStorage.setItem('restrictions', JSON.stringify(restrictions));
        updateRestrictionsUI();
    };

    // Функции для работы с уведомлениями
    window.updateNotificationSettings = function(type, enabled) {
        const notifications = JSON.parse(localStorage.getItem('notifications') || '{}');
        notifications[type] = enabled;
        localStorage.setItem('notifications', JSON.stringify(notifications));
    };

    // Функции для работы с трекерами
    window.connectTracker = function(type) {
        window.tg.showAlert(`Подключение ${type} будет доступно в следующем обновлении`);
    };

    // Функции для работы с UI
    window.updateGoalsUI = function() {
        const goals = JSON.parse(localStorage.getItem('goals') || '{}');
        Object.keys(goals).forEach(goalType => {
            const element = document.querySelector(`[data-goal="${goalType}"]`);
            if (element) {
                element.classList.toggle('active', goals[goalType]);
            }
        });
    };

    window.updateRestrictionsUI = function() {
        const restrictions = JSON.parse(localStorage.getItem('restrictions') || '{}');
        Object.keys(restrictions).forEach(restrictionType => {
            const element = document.querySelector(`[data-restriction="${restrictionType}"]`);
            if (element) {
                element.classList.toggle('active', restrictions[restrictionType]);
            }
        });
    };

    // Функция для загрузки фото профиля
    window.uploadProfilePhoto = function() {
        if (window.tg.platform === 'tdesktop') {
            window.tg.showPopup({
                title: 'Загрузка фото',
                message: 'Используйте мобильное приложение для загрузки фото'
            });
        } else {
            window.tg.expand();
            window.tg.showScanQrPopup({
                text: 'Выберите фото'
            }, function(file) {
                if (file) {
                    document.getElementById('profile-image').src = URL.createObjectURL(file);
                }
            });
        }
    };

    // Инициализация при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        // Устанавливаем тему
        document.documentElement.style.setProperty('--tg-theme-button-color', window.tg.MainButton.color);
        
        // Загружаем начальные данные
        window.updateGoalsUI();
        window.updateRestrictionsUI();
    });
    </script>

    <!-- Подключаем остальные скрипты -->
    <script src="js/app.js" defer></script>
    <script src="js/profile.js" defer></script>
    <script src="js/workout.js" defer></script>
</body>
</html>
